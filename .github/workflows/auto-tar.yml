name: Auto .tar dockermanager directory

on:
  workflow_dispatch:
  push:
    paths:
      - 'dockermanager/**'

jobs:
  tar-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # REQUIRED to allow push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Required for pushing

      - name: Create tar of dockermanager contents
        run: |
          tar -cvf dockermanager.tar -C dockermanager .

      - name: Commit and push tarball
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add dockermanager.tar
          git commit -m "Auto-generated dockermanager.tar"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
